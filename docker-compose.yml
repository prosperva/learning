services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "${SA_PASSWORD}"
        -Q "SELECT 1" -No
        || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"   # Blob service
    environment:
      AZURITE_ACCOUNTS: "devstoreaccount1:${AZURITE_KEY}"
    command: azurite-blob --blobHost 0.0.0.0 --loose --skipApiVersionCheck

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=CommonFields;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True"
      AzureStorage__AccountName: "devstoreaccount1"
      AzureStorage__AccountKey: "${AZURITE_KEY}"
      AzureStorage__ServiceUri: "http://azurite:10000"
      AzureStorage__ContainerName: "attachments"
    depends_on:
      sqlserver:
        condition: service_healthy
      azurite:
        condition: service_started

volumes:
  sqlserver_data:
